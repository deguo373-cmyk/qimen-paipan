<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 易经漫画 · 大白话六十四卦</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════════════════
       易经漫画 · 古书漫画风
       ════════════════════════════════════════════ */
    :root {
      --paper: #f5f0e8;
      --paper-dark: #e8e0d0;
      --paper-light: #faf6ef;
      --ink: #2c2416;
      --ink-light: #5a4f3c;
      --ink-muted: #8a7e6b;
      --cinnabar: #c23b22;
      --cinnabar-light: #e85d4a;
      --cinnabar-dark: #9a2e1a;
      --stone-blue: #4a6741;
      --stone-blue-light: #6b8f5c;
      --gold: #b8933e;
      --gold-light: #d4b05a;
      --border-color: #c8b89a;
      --font-title: 'Noto Serif SC', 'SimSun', serif;
      --font-body: 'Inter', 'Noto Serif SC', 'PingFang SC', sans-serif;
      --font-hand: 'Ma Shan Zheng', cursive;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--paper);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    /* 宣纸底纹 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,90,0.03) 2px, rgba(139,119,90,0.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139,119,90,0.02) 3px, rgba(139,119,90,0.02) 6px),
        radial-gradient(ellipse at 20% 50%, rgba(139,119,90,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,119,90,0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ────── 页眉 ────── */
    .header {
      text-align: center;
      padding: 32px 20px 24px;
      margin-bottom: 32px;
      position: relative;
    }
    .header::after {
      content: '';
      display: block;
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold));
      margin: 16px auto 0;
      border-radius: 2px;
    }
    .header h1 {
      font-family: var(--font-title);
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: 4px;
    }
    .header h1 .emoji-big { font-size: 2.8rem; }
    .header .subtitle {
      font-family: var(--font-hand);
      font-size: 1.3rem;
      color: var(--ink-muted);
      margin-top: 4px;
      letter-spacing: 2px;
    }
    .header .sub-desc {
      font-size: 0.95rem;
      color: var(--ink-light);
      margin-top: 8px;
      opacity: 0.8;
    }

    /* ────── 工具栏 ────── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      padding: 16px 20px;
      background: var(--paper-light);
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(44,36,22,0.05);
    }
    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 18px;
      border: 1.5px solid var(--border-color);
      border-radius: 20px;
      background: transparent;
      color: var(--ink-light);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .filter-btn:hover {
      border-color: var(--stone-blue);
      color: var(--stone-blue);
      background: rgba(74,103,65,0.06);
    }
    .filter-btn.active {
      background: var(--stone-blue);
      color: #fff;
      border-color: var(--stone-blue);
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border: 1.5px solid var(--border-color);
      border-radius: 20px;
      background: #fff;
      flex: 0 1 260px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--cinnabar);
    }
    .search-box input {
      border: none;
      outline: none;
      background: transparent;
      padding: 6px 0;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--ink);
      width: 100%;
    }
    .search-box .search-icon {
      color: var(--ink-muted);
      font-size: 0.9rem;
    }
    .result-count {
      font-size: 0.8rem;
      color: var(--ink-muted);
      padding: 4px 10px;
      background: var(--paper-dark);
      border-radius: 12px;
    }

    /* ────── 六十四卦网格 ────── */
    .hexagram-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    /* ────── 卦卡（折叠态） ────── */
    .hex-card {
      background: var(--paper-light);
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hex-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .hex-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(44,36,22,0.1);
      border-color: var(--gold);
    }
    .hex-card:hover::before { opacity: 1; }
    .hex-card .symbol {
      font-size: 2rem;
      display: block;
      margin-bottom: 4px;
      line-height: 1.2;
      color: var(--ink);
    }
    .hex-card .name {
      font-family: var(--font-title);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .hex-card .id-badge {
      display: inline-block;
      font-size: 0.65rem;
      color: var(--ink-muted);
      background: var(--paper-dark);
      padding: 1px 8px;
      border-radius: 8px;
      margin-top: 2px;
    }
    .hex-card .cat-badge {
      display: inline-block;
      font-size: 0.6rem;
      color: var(--stone-blue);
      padding: 0 6px;
      margin-top: 2px;
    }
    .hex-card .tags-mini {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
    }
    .hex-card .tags-mini span {
      font-size: 0.6rem;
      background: rgba(74,103,65,0.08);
      color: var(--stone-blue);
      padding: 1px 6px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .hex-card .click-hint {
      font-size: 0.6rem;
      color: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
      margin-top: 2px;
    }
    .hex-card:hover .click-hint { opacity: 1; }

    /* ────── 展开的详情面板（漫画风格） ────── */
    .detail-panel {
      display: none;
      grid-column: 1 / -1;
      background: var(--paper-light);
      border: 2px dashed var(--gold);
      border-radius: 16px;
      padding: 32px 36px;
      margin: 4px 0 8px;
      position: relative;
      animation: panelSlide 0.35s ease;
      box-shadow: 0 4px 24px rgba(184,147,62,0.1);
    }
    @keyframes panelSlide {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-panel.open { display: block; }

    .detail-close {
      position: absolute;
      top: 12px; right: 16px;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--ink-muted);
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: var(--font-body);
      line-height: 1;
    }
    .detail-close:hover { color: var(--cinnabar); }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border-color);
    }
    .detail-header .symbol-big {
      font-size: 3.2rem;
      line-height: 1;
    }
    .detail-header .name-box h2 {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--ink);
    }
    .detail-header .name-box .pinyin {
      font-family: var(--font-hand);
      font-size: 1.2rem;
      color: var(--ink-muted);
    }
    .detail-header .trigram-info {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 2px;
    }
    .detail-header .trigram-info span {
      background: rgba(74,103,65,0.08);
      padding: 2px 8px;
      border-radius: 6px;
      margin: 0 2px;
    }

    /* 漫画解说板块 */
    .comic-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 700px) {
      .comic-section { grid-template-columns: 1fr; }
    }

    .comic-panel {
      background: #fff;
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
    }
    .comic-panel::before {
      content: attr(data-label);
      position: absolute;
      top: -10px;
      left: 16px;
      background: var(--paper-light);
      padding: 0 8px;
      font-family: var(--font-hand);
      font-size: 0.9rem;
      color: var(--cinnabar);
      font-weight: 700;
    }

    .core-line {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--cinnabar-dark);
      margin-bottom: 12px;
      padding: 8px 14px;
      background: rgba(194,59,34,0.06);
      border-left: 3px solid var(--cinnabar);
      border-radius: 0 8px 8px 0;
    }

    .comic-explanation {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--ink);
    }
    .comic-explanation p {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .advice-box {
      background: linear-gradient(135deg, rgba(74,103,65,0.06), rgba(184,147,62,0.06));
      border: 1.5px solid var(--stone-blue);
      border-radius: 12px;
      padding: 16px 18px;
      margin-top: 16px;
    }
    .advice-box .advice-label {
      font-family: var(--font-hand);
      font-size: 1rem;
      color: var(--stone-blue);
      font-weight: 700;
    }
    .advice-box .advice-text {
      font-size: 0.95rem;
      color: var(--ink);
      margin-top: 4px;
    }

    .tags-list {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tags-list span {
      padding: 4px 12px;
      background: rgba(184,147,62,0.1);
      color: var(--gold);
      border: 1px solid rgba(184,147,62,0.25);
      border-radius: 16px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* 右侧趣味元素：小漫画插图 */
    .comic-illustration {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      background: rgba(245,240,232,0.5);
      border-radius: 12px;
      min-height: 140px;
    }
    .comic-illustration .big-emoji {
      font-size: 3.5rem;
      line-height: 1;
    }
    .comic-illustration .speech-bubble {
      max-width: 220px;
      background: #fff;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 16px;
      position: relative;
      font-size: 0.9rem;
      text-align: center;
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(44,36,22,0.06);
    }
    .comic-illustration .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #fff;
    }
    .comic-illustration .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 12px solid var(--border-color);
      z-index: -1;
    }

    /* ────── 响应式 ────── */
    @media (max-width: 768px) {
      .header h1 { font-size: 1.7rem; }
      .hexagram-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
      .hex-card { padding: 10px 6px; }
      .hex-card .symbol { font-size: 1.6rem; }
      .hex-card .name { font-size: 0.9rem; }
      .detail-panel { padding: 20px 16px; }
      .detail-header .symbol-big { font-size: 2.4rem; }
      .detail-header .name-box h2 { font-size: 1.3rem; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { flex: 1; }
    }
    @media (max-width: 480px) {
      .hexagram-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    }

    /* ────── 无结果 ────── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--ink-muted);
      font-family: var(--font-hand);
      font-size: 1.3rem;
    }

    /* ────── 滚动条美化 ────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--paper-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-muted); }

    /* ────── 打印 ────── */
    @media print {
      body::before { display: none; }
      .hex-card { break-inside: avoid; }
      .detail-panel { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ═══ 页眉 ═══ -->
  <div class="header">
    <h1><span class="emoji-big">📖</span> 易经漫画</h1>
    <div class="subtitle">六十四卦 · 大白话解说</div>
    <div class="sub-desc">👇 点击任意卦象，看看它在说什么 &nbsp;·&nbsp; 没有文言文，只有大实话</div>
  </div>

  <!-- ═══ 工具栏 ═══ -->
  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">📜 全部</button>
      <button class="filter-btn" data-filter="上经">☰ 上经 · 天道（1–30）</button>
      <button class="filter-btn" data-filter="下经">☷ 下经 · 人事（31–64）</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索卦名、关键词…" autocomplete="off">
    </div>
    <span class="result-count" id="resultCount">64 / 64</span>
  </div>

  <!-- ═══ 卦象网格 ═══ -->
  <div class="hexagram-grid" id="hexGrid"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 六十四卦数据
// ═══════════════════════════════════════════════════════════════

const HEXAGRAMS = [
  // ─── 上经 (1-30) ───

    advice: '💪 现在正是你大展拳脚的时候！大胆去干，别犹豫。但也要注意别太骄傲，保持谦虚才能飞得更高。',
    tags: ['开创', '领导', '自强'],
    category: '上经',
    trigram_upper: '乾☰（天）', trigram_lower: '乾☰（天）',

  {

    emoji: '🌱'
  },
  {
    id: 4, symbol: '\u4DC3', name: '蒙', pinyin: 'méng',
    core: '🧒 启蒙时刻——不会就学，不懂就问',
    comic_explanation: '蒙卦就像小朋友第一次上学🎒，啥都不懂，但又充满好奇。它想告诉你：承认自己"不懂"一点也不丢人，不懂装懂才可怕。生活中我们每个人都是"蒙童"，遇到不懂的事就大胆去问、去学。记住，最聪明的人往往是那个最愿意说"请教一下"的人。',

  },
  {
    id: 5, symbol: '\u4DC4', name: '需', pinyin: 'xū',

  },
  {

// 渲染引擎
// ═══════════════════════════════════════════════════════════════

let currentFilter = 'all';
let currentSearch = '';
let openDetailId = null;

function getFilteredData() {
  return HEXAGRAMS.filter(h => {
    // 分类过滤
    if (currentFilter !== 'all' && h.category !== currentFilter) return false;
    // 搜索过滤
    if (currentSearch) {
      const kw = currentSearch.toLowerCase();
      const matchName = h.name.includes(currentSearch);
      const matchPinyin = h.pinyin.toLowerCase().includes(kw);
      const matchCore = h.core.includes(currentSearch);
      const matchTags = h.tags.some(t => t.includes(currentSearch));
      const matchExpl = h.comic_explanation.includes(currentSearch);
      const matchAdvice = h.advice.includes(currentSearch);
      if (!matchName && !matchPinyin && !matchCore && !matchTags && !matchExpl && !matchAdvice) return false;
    }
    return true;
  });
}

function render() {
  const grid = document.getElementById('hexGrid');
  const filtered = getFilteredData();
  const countEl = document.getElementById('resultCount');
  countEl.textContent = `${filtered.length} / ${HEXAGRAMS.length}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">😅 没找到匹配的卦……换个关键词试试？</div>';
    return;
  }

  let html = '';
  for (const h of filtered) {
    // 卡片
    const isOpen = openDetailId === h.id;
    html += `
      <div class="hex-card ${isOpen ? 'active' : ''}" data-id="${h.id}" onclick="toggleDetail(${h.id})">
        <span class="symbol">${h.symbol}</span>
        <div class="name">${h.name}</div>
        <span class="id-badge">#${h.id}</span>
        <span class="cat-badge">${h.category === '上经' ? '☰' : '☷'} ${h.category}</span>
        <div class="tags-mini">${h.tags.map(t => `<span>${t}</span>`).join('')}</div>
        <div class="click-hint">▼ 点击展开</div>
      </div>
    `;

    // 详情面板
    if (isOpen) {
      html += renderDetail(h);
    }
  }

  grid.innerHTML = html;
}

function renderDetail(h) {
  return `
    <div class="detail-panel open" id="detail-${h.id}">
      <button class="detail-close" onclick="event.stopPropagation(); toggleDetail(${h.id})" title="收起">✕</button>

      <div class="detail-header">
        <div class="symbol-big">${h.symbol}</div>
        <div class="name-box">
          <h2>${h.name} <span class="pinyin">${h.pinyin}</span></h2>
          <div class="trigram-info">
            <span>上 ${h.trigram_upper}</span> · <span>下 ${h.trigram_lower}</span>
            · ${h.category}
          </div>
        </div>
      </div>

      <div class="comic-section">
        <div class="comic-panel" data-label="📖 大白话解说">
          <div class="core-line">${h.core}</div>
          <div class="comic-explanation">
            ${h.comic_explanation.split('\n').filter(l => l.trim()).map(p => `<p>${p.trim()}</p>`).join('')}
          </div>
          <div class="advice-box">

            <div class="advice-text">${h.advice}</div>

          <div class="tags-list">

  `;
}

function toggleDetail(id) {
  if (openDetailId === id) {
    openDetailId = null;
  } else {
    openDetailId = id;
  }
  // 滚动到该卡片
  render();
  if (openDetailId) {
    setTimeout(() => {
      const el = document.querySelector(`.hex-card[data-id="${openDetailId}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

// ────── 搜索与过滤 ──────
function setupUI() {
  // 过滤按钮
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      openDetailId = null;
      render();
    });
  });

  // 搜索
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', function() {
    currentSearch = this.value.trim();
    openDetailId = null;
    render();
  });
}

// ═══════════════════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  setupUI();
  render();
});
